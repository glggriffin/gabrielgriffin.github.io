{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- end custom head snippets -->

<script>
  function getParticleTheme() {
    const savedTheme = document.documentElement.getAttribute("data-theme");
    if (savedTheme === "dark") {
      return "dark";
    }

    return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }

  function getParticleColor(varName, fallback) {
    const value = getComputedStyle(document.documentElement)
      .getPropertyValue(varName)
      .trim();

    return value || fallback;
  }

  function getParticlePalette() {
    if (getParticleTheme() === "dark") {
      return {
        background: getParticleColor("--particles-bg", "#111827"),
        node: getParticleColor("--particles-node", "#e5e7eb"),
        line: getParticleColor("--particles-line", "#9ca3af")
      };
    }

    return {
      background: getParticleColor("--particles-bg", "#f3f4f6"),
      node: getParticleColor("--particles-node", "#374151"),
      line: getParticleColor("--particles-line", "#6b7280")
    };
  }

  function destroyParticles() {
    if (window.pJSDom && window.pJSDom.length) {
      window.pJSDom.forEach((instance) => {
        if (instance && instance.pJS && instance.pJS.fn && instance.pJS.fn.vendors && instance.pJS.fn.vendors.destroypJS) {
          instance.pJS.fn.vendors.destroypJS();
        }
      });
      window.pJSDom = [];
    }

    const container = document.getElementById("particles-js");
    if (container) {
      container.innerHTML = "";
    }
  }

  function loadParticles() {
    const container = document.getElementById("particles-js");
    if (!container || typeof particlesJS === "undefined") {
      return;
    }

    const palette = getParticlePalette();

    destroyParticles();
    container.style.background = palette.background;

    particlesJS("particles-js", {
      particles: {
        number: {
          value: 60,
          density: { enable: true, value_area: 800 }
        },
        color: { value: palette.node },
        shape: { type: "circle" },
        opacity: { value: 0.35 },
        size: { value: 3, random: true },
        line_linked: {
          enable: true,
          distance: 180,
          color: palette.line,
          opacity: 0.2,
          width: 1
        },
        move: {
          enable: true,
          speed: 1.2,
          direction: "none",
          out_mode: "out"
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "grab" },
          onclick: { enable: true, mode: "push" },
          resize: true
        },
        modes: {
          grab: {
            distance: 160,
            line_linked: { opacity: 0.35 }
          },
          push: { particles_nb: 3 }
        }
      },
      retina_detect: true
    });
  }

  function refreshParticlesTheme() {
    window.setTimeout(loadParticles, 50);
  }

  window.refreshParticlesTheme = refreshParticlesTheme;

  document.addEventListener("DOMContentLoaded", function () {
    loadParticles();

    const observer = new MutationObserver(refreshParticlesTheme);
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["class", "data-theme"]
    });
    observer.observe(document.body, {
      attributes: true,
      attributeFilter: ["class", "data-theme"]
    });
  });

  document.addEventListener("theme:changed", refreshParticlesTheme);

  const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
  if (mediaQuery.addEventListener) {
    mediaQuery.addEventListener("change", refreshParticlesTheme);
  } else {
    mediaQuery.addListener(refreshParticlesTheme);
  }
</script>
