{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>


<!-- end custom head snippets -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
function getColor(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

function loadParticles() {
  const el = document.getElementById("particles-js");
  if (!el || typeof particlesJS === "undefined") return;

  el.innerHTML = "";

  particlesJS("particles-js", {
    particles: {
      number: {
        value: 60,
        density: { enable: true, value_area: 800 }
      },
      color: { value: getColor("--particles-node") },
      shape: { type: "circle" },
      opacity: { value: 0.35 },
      size: { value: 3, random: true },
      line_linked: {
        enable: true,
        distance: 140,
        color: getColor("--particles-line"),
        opacity: 0.2,
        width: 1
      },
      move: {
        enable: true,
        speed: 1.2,
        direction: "none",
        out_mode: "out"
      }
    },
    interactivity: {
      detect_on: "canvas",
      events: {
        onhover: { enable: true, mode: "grab" },
        onclick: { enable: true, mode: "push" },
        resize: true
      },
      modes: {
        grab: {
          distance: 160,
          line_linked: { opacity: 0.35 }
        },
        push: { particles_nb: 3 }
      }
    },
    retina_detect: true
  });
}

document.addEventListener("DOMContentLoaded", function () {
  loadParticles();

  // React to theme toggle (Academic Pages uses class changes)
  const observer = new MutationObserver(() => {
    loadParticles();
  });

  observer.observe(document.documentElement, {
    attributes: true,
    attributeFilter: ["class", "data-theme"]
  });

  // React to system dark/light mode
  window.matchMedia("(prefers-color-scheme: dark)")
    .addEventListener("change", loadParticles);
});
</script>
